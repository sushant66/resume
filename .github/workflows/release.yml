name: Build and Release Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .docker
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/latex-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate resume artifacts
        run: python3 scripts/generate_resume.py

      - name: Set build date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Build Resume
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/latex-builder:latest
          docker tag ghcr.io/${{ github.repository_owner }}/latex-builder:latest latex-builder
          make compile

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges | head -20)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --oneline --no-merges)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get PDF size
        id: meta
        run: |
          SIZE=$(du -sh build/Sushant_Kadam.pdf | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "v${{ github.run_number }} — ${{ steps.date.outputs.date }}"
          body: |
            ### 📦 Build Info
            | Field | Value |
            |-------|-------|
            | Build | #${{ github.run_number }} |
            | Date | ${{ steps.date.outputs.date }} |
            | Commit | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
            | Author | ${{ github.actor }} |
            | Size | ${{ steps.meta.outputs.size }} |

            ### 📝 Changes
            ```
            ${{ steps.changelog.outputs.log }}
            ```
          files: build/Sushant_Kadam.pdf
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
